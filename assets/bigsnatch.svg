<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dc9f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
    <filter id="softblur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#2a2a4a" stroke-width="4"/>

  <!-- Outer radar rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#4dc9f6" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4dc9f6" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#4dc9f6" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#4dc9f6" stroke-width="1.5" opacity="0.3"/>

  <!-- Cross hairs -->
  <line x1="256" y1="56" x2="256" y2="456" stroke="#4dc9f6" stroke-width="0.8" opacity="0.12"/>
  <line x1="56" y1="256" x2="456" y2="256" stroke="#4dc9f6" stroke-width="0.8" opacity="0.12"/>
  <line x1="115" y1="115" x2="397" y2="397" stroke="#4dc9f6" stroke-width="0.8" opacity="0.08"/>
  <line x1="397" y1="115" x2="115" y2="397" stroke="#4dc9f6" stroke-width="0.8" opacity="0.08"/>

  <!-- Network nodes - small dots representing connections -->
  <circle cx="180" cy="160" r="5" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="340" cy="180" r="4" fill="#4ecdc4" opacity="0.8"/>
  <circle cx="150" cy="300" r="3.5" fill="#ffe66d" opacity="0.7"/>
  <circle cx="370" cy="320" r="4.5" fill="#4ecdc4" opacity="0.85"/>
  <circle cx="300" cy="130" r="3" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="200" cy="370" r="3" fill="#ffe66d" opacity="0.65"/>
  <circle cx="380" cy="220" r="3.5" fill="#4ecdc4" opacity="0.7"/>
  <circle cx="130" cy="230" r="3" fill="#ff6b6b" opacity="0.5"/>

  <!-- Connection lines from nodes to center -->
  <line x1="180" y1="160" x2="256" y2="256" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="180" x2="256" y2="256" stroke="#4ecdc4" stroke-width="1" opacity="0.25"/>
  <line x1="150" y1="300" x2="256" y2="256" stroke="#ffe66d" stroke-width="1" opacity="0.2"/>
  <line x1="370" y1="320" x2="256" y2="256" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>

  <!-- Central eye - outer shape -->
  <ellipse cx="256" cy="256" rx="95" ry="55" fill="none" stroke="url(#eye)" stroke-width="4" opacity="0.9"/>

  <!-- Eye glow behind -->
  <ellipse cx="256" cy="256" rx="60" ry="35" fill="url(#glow)" filter="url(#blur)" opacity="0.5"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="32" fill="none" stroke="url(#eye)" stroke-width="3"/>
  <circle cx="256" cy="256" r="28" fill="#0a1628" opacity="0.8"/>
  <circle cx="256" cy="256" r="22" fill="#0d47a1" opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="14" fill="#00e5ff"/>
  <circle cx="256" cy="256" r="8" fill="#b2ebf2"/>

  <!-- Pupil highlight -->
  <circle cx="249" cy="249" r="4" fill="white" opacity="0.7"/>

  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="256" y2="56" stroke="#00e5ff" stroke-width="2" opacity="0.5" transform="rotate(35 256 256)"/>
  <!-- Sweep trail -->
  <path d="M 256 256 L 256 56 A 200 200 0 0 0 186 76 Z" fill="#00e5ff" opacity="0.06" transform="rotate(35 256 256)"/>
  <path d="M 256 256 L 256 56 A 200 200 0 0 0 220 62 Z" fill="#00e5ff" opacity="0.1" transform="rotate(35 256 256)"/>
</svg>
